<div
  appHighlight="lightblue"
  class="card"
  [ngClass]="cardClasses"
  [ngStyle]="{
    'border-left':
      course.gradeStatus === 'passed'
        ? '8px solid green'
        : course.gradeStatus === 'failed'
        ? '8px solid red'
        : '8px solid gray'
  }"
>

  <h2>{{ course.name }}</h2>

  <p><strong>ID:</strong> {{ course.id }}</p>

  <p><strong>Code:</strong> {{ course.code }}</p>

  <p>
    <strong>Credits:</strong>
    {{ course.credits | creditLabel }}
  </p>

  <div [ngSwitch]="course.gradeStatus">

    <p *ngSwitchCase="'passed'" style="color:green">
      ✅ Passed
    </p>

    <p *ngSwitchCase="'failed'" style="color:red">
      ❌ Failed
    </p>

    <p *ngSwitchDefault style="color:gray">
      ⏳ Pending
    </p>

  </div>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

  <br><br>

  <div *ngIf="isExpanded">

    <p><strong>Course Name:</strong> {{ course.name }}</p>

    <p><strong>Course Code:</strong> {{ course.code }}</p>

    <p><strong>Credits:</strong> {{ course.credits }}</p>

    <p><strong>Status:</strong> {{ course.gradeStatus }}</p>

  </div>

  <br>

  <button (click)="enroll()">
    Enroll
  </button>

</div>
